<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfect site!</title>
    <style>
        body{
            text-align: center;
            overflow: hidden;
            display: flex;
            height: 100vh;
            justify-content: center;
            align-items: center;
            background-color: rgba(0, 0, 0, 0.966);
        }
        img{
            cursor: pointer;
            width: 50vw;
        }
        h1{
            font-size: 30px;
            color: rgba(255, 255, 255, 0.26);
            padding: 0;
        }
        @media (max-width: 800px){
            img{
                width: 95vw;
            }
        }
    </style>
</head>
<body>
    <div>
        <img class="btn" src="da-poebat-mne-gosling-1.jpg" alt="#">
        <h1>Нажмите на изображения чтобы возпроизвести музыку!</h1>
        <audio class="myAudio" src="betkhoven-lunnaja-sonata.mp3"></audio>
    </div>
    <script>
        var check = false;
        var media = document.querySelector('.myAudio');
        document.querySelector('.btn').onclick = PlayPause;
        function PlayPause(){
            if(check == false){
                media.play();
            }
            else{
                media.pause();
            }
            check = !check;
        }
    </script>
</body>
</html>
